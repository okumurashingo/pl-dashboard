<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
</head><body>
<script>
// キャッシュを完全回避：毎回ユニークなURLでapp.htmlを読み込む
var t = Date.now();
location.replace('app.html?v=' + t);
</script>
</body></html>
